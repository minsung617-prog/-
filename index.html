<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SBS 안산 개강안내</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,"Noto Sans KR",sans-serif}
body{background:#f6f8fc;color:#111827}
.top{background:#123c7c;color:#fff;padding:18px 24px 16px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
.title{font-size:22px;font-weight:900}.sub{font-size:12px;opacity:.85;margin-top:5px}
.search{width:280px;padding:12px 16px;border:1px solid rgba(255,255,255,.45);border-radius:999px;background:rgba(255,255,255,.13);color:#fff;font-size:14px}
.search::placeholder{color:#dbeafe}
.nav{background:#123c7c;padding:0 24px 16px;display:flex;gap:8px;flex-wrap:wrap}
.nav button{border:1px solid rgba(255,255,255,.45);background:#255aa0;color:#fff;border-radius:7px;padding:10px 18px;font-weight:800;cursor:pointer}
.nav button.active{background:#fff;color:#123c7c}
.main{padding:24px;max-width:1200px;margin:auto}
.tabs{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.left-tabs{display:flex;gap:12px;flex-wrap:wrap}
.tab{border:1px solid #c8d4e8;background:#fff;color:#3b5f95;border-radius:999px;padding:12px 22px;font-weight:900;cursor:pointer}
.tab.active{background:#0f172a;color:#fff;border-color:#0f172a}
.actions{display:flex;gap:10px}
.action{border:1px solid #9db5da;background:#fff;color:#123c7c;border-radius:8px;padding:11px 16px;font-weight:900;cursor:pointer}
.action.primary{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.count{margin:14px 0;color:#64748b;font-size:14px}.count b{color:#123c7c}
.list{display:flex;flex-direction:column;gap:10px}
.item{background:#fff;border:1px solid #dbe3ef;border-radius:12px;padding:18px 20px;display:grid;grid-template-columns:34px 78px 1fr 78px;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(15,31,61,.04)}
.check{width:20px;height:20px;accent-color:#1d4ed8}
.badge{display:inline-flex;justify-content:center;align-items:center;background:#2563eb;color:#fff;border-radius:7px;padding:8px 10px;font-size:13px;font-weight:900}
.name{font-size:18px;font-weight:900;color:#0f172a;margin-bottom:8px}
.meta{color:#64748b;font-size:14px;line-height:1.6}
.copy{border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;border-radius:8px;padding:11px 13px;font-weight:900;cursor:pointer}
.empty{background:#fff;border:1px solid #dbe3ef;border-radius:12px;padding:30px;text-align:center;color:#64748b;line-height:1.7}
@media(max-width:760px){.top{align-items:flex-start}.search{width:100%}.item{grid-template-columns:28px 70px 1fr;gap:8px}.copy{grid-column:1/4}}
</style>
</head>
<body>
<header class="top">
  <div><div class="title">SBS컴퓨터아트학원 안산점 — 개강안내</div><div class="sub">과목을 선택해 메시지를 복사하세요</div></div>
  <input id="search" class="search" placeholder="🔍 과목명 검색">
</header>
<nav class="nav">
  <button class="room active" onclick="setRoom('전체', this)">전체</button>
  <button class="room" onclick="setRoom('A', this)">A강의장</button>
  <button class="room" onclick="setRoom('B', this)">B강의장</button>
  <button class="room" onclick="setRoom('C', this)">C강의장</button>
  <button class="room" onclick="setRoom('D', this)">D강의장</button>
  <button class="room" onclick="setRoom('E', this)">E강의장</button>
  <button class="room" onclick="setRoom('F', this)">F강의장</button>
  <button class="room" onclick="setRoom('G', this)">G강의장</button>
  <button class="room" onclick="setRoom('H', this)">H강의장</button>
</nav>
<main class="main">
  <section class="tabs">
    <div class="left-tabs">
      <button id="allBtn" class="tab active" onclick="setType('전체')">전체</button>
      <button id="weekdayBtn" class="tab" onclick="setType('평일')">🗓 5월 평일반</button>
      <button id="weekendBtn" class="tab" onclick="setType('주말')">📅 5월 주말반</button>
    </div>
    <div class="actions">
      <button class="action" onclick="toggleAllChecks()">☑ 전체선택</button>
      <button class="action primary" onclick="copySelected()">📋 선택복사</button>
    </div>
  </section>
  <div id="count" class="count">데이터 불러오는 중...</div>
  <section id="list" class="list"></section>
</main>
<script>
const gvizUrl = "https://docs.google.com/spreadsheets/d/1kAqljMGsh_VoYbP3BDEvaJD9fWFYUIM6ZsuAt5v9qos/gviz/tq?gid=251230523&tqx=out:json;responseHandler:handleSheetData";

let allCourses = [];
let currentType = "전체";
let currentRoom = "전체";

function loadData(){
  const s = document.createElement("script");
  s.src = gvizUrl;
  s.onerror = function(){
    document.getElementById("count").innerHTML = "<b style='color:#b91c1c'>데이터 로딩 실패</b> — 구글시트 공유/게시 상태를 확인해주세요.";
  };
  document.body.appendChild(s);
}

function handleSheetData(data){
  try{
    const rows = data.table.rows || [];
    const cols = data.table.cols || [];
    const headers = cols.map(c => c.label || "");
    allCourses = rows.map(row => {
      const obj = {};
      headers.forEach((key, i) => {
        const cell = row.c[i];
        obj[key] = cell ? (cell.f || cell.v || "") : "";
      });
      const room = String(obj["강의장"] || "");
      return {
        id: `${obj["구분"]}-${obj["과목명"]}-${obj["강의장"]}-${obj["시간"]}-${obj["개강일"]}`,
        구분: String(obj["구분"] || ""),
        과목명: String(obj["과목명"] || ""),
        강의장: room,
        강의장그룹: room.charAt(0),
        요일: String(obj["요일"] || ""),
        시간: String(obj["시간"] || ""),
        개강일: String(obj["개강일"] || ""),
        종강일: String(obj["종강일"] || ""),
        강사명: String(obj["강사명"] || ""),
        수업형태: String(obj["수업형태"] || "대면"),
        비대면링크: String(obj["비대면링크"] || "")
      };
    }).filter(x => x.과목명);
    render();
  }catch(e){
    document.getElementById("count").innerHTML = "<b style='color:#b91c1c'>데이터 처리 실패</b> — WEB_DATA 헤더를 확인해주세요.";
    console.error(e);
  }
}

function setType(type){
  currentType = type;
  document.getElementById("allBtn").classList.toggle("active", type==="전체");
  document.getElementById("weekdayBtn").classList.toggle("active", type==="평일");
  document.getElementById("weekendBtn").classList.toggle("active", type==="주말");
  render();
}
function setRoom(room, btn){
  currentRoom = room;
  document.querySelectorAll(".room").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}
function getFiltered(){
  const keyword = document.getElementById("search").value.trim();
  return allCourses.filter(x => {
    const typeOk = currentType === "전체" || x.구분 === currentType;
    const roomOk = currentRoom === "전체" || x.강의장그룹 === currentRoom;
    const searchOk = !keyword || x.과목명.includes(keyword);
    return typeOk && roomOk && searchOk;
  });
}
function render(){
  const filtered = getFiltered();
  document.getElementById("count").innerHTML = `총 <b>${filtered.length}</b>개 과목　　<span id="selectedCount">0개 선택됨</span>`;
  if(filtered.length === 0){
    document.getElementById("list").innerHTML = `<div class="empty">표시할 과정이 없습니다.</div>`;
    return;
  }
  document.getElementById("list").innerHTML = filtered.map(x => `
    <article class="item">
      <input class="check" type="checkbox" data-id="${escapeHtml(x.id)}" onchange="updateSelectedCount()">
      <span class="badge">${escapeHtml(x.강의장그룹 || "-")}강의장</span>
      <div>
        <div class="name">${escapeHtml(x.과목명)}</div>
        <div class="meta">${escapeHtml(x.구분)} | ${escapeHtml(x.요일 || "-")} | ${escapeHtml(x.시간 || "-")} | ${shortDate(x.개강일)}~${shortDate(x.종강일)} | ${escapeHtml(x.강사명 || "-")}강사</div>
      </div>
      <button class="copy" onclick='copyCourse(${JSON.stringify(x)})'>📋 복사</button>
    </article>
  `).join("");
}
function shortDate(d){ return d ? String(d).slice(5).replace("-",".") : "-"; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m])); }
function updateSelectedCount(){
  const n = document.querySelectorAll(".check:checked").length;
  const el = document.getElementById("selectedCount");
  if(el) el.innerText = `${n}개 선택됨`;
}
function toggleAllChecks(){
  const checks = [...document.querySelectorAll(".check")];
  const allChecked = checks.length > 0 && checks.every(x => x.checked);
  checks.forEach(x => x.checked = !allChecked);
  updateSelectedCount();
}
document.getElementById("search").addEventListener("input", render);

function makeText(x){
return `■ SBS아카데미안산 개강안내 ■

*과목명: ${x.과목명}
*개강일: ${x.개강일}
*종강일: ${x.종강일}
*강의장: ${x.강의장}
*수업요일: ${x.요일}
*수업시간: ${x.시간}
*수업형태: ${x.수업형태}

*비대면링크:
${x.비대면링크}

★수강생 필독★`;
}
function copyCourse(x){
  navigator.clipboard.writeText(makeText(x));
  alert("복사되었습니다.");
}
function copySelected(){
  const ids = [...document.querySelectorAll(".check:checked")].map(x => x.dataset.id);
  if(ids.length === 0){ alert("선택된 과목이 없습니다."); return; }
  const selected = getFiltered().filter(x => ids.includes(x.id));
  navigator.clipboard.writeText(selected.map(makeText).join("\n\n--------------------\n\n"));
  alert(`${selected.length}개 과목이 복사되었습니다.`);
}
loadData();
</script>
</body>
</html>
